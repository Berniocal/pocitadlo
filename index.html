<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Počítadlo</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>Počítadlo</h1>
    <div class="header-actions">
      <button id="themeBtn" class="icon-btn" aria-label="Tmavý režim" title="Tmavý režim">◐</button>
      <button id="calendarBtn" class="icon-btn hidden" aria-label="Kalendář">▦</button>
      <button id="overviewBtn" class="icon-btn hidden" aria-label="Přehled">▥</button>
      <button id="accountBtn" class="icon-btn hidden" aria-label="Účet">⋮</button>
    </div>
  </header>

  <main>
    <section id="loginView" class="center-card">
      <button id="loginBtn" class="google-btn">Přihlásit přes Google</button>
      <p id="loginError" class="error"></p>
    </section>

    <section id="appView" class="hidden">
      <div id="items" class="items"></div>
      <p id="emptyState" class="empty hidden">Zatím tu nic není.</p>
    </section>

    <section id="calendarView" class="hidden">
      <div class="view-card">
        <div class="view-heading">
          <button id="calendarBack" class="secondary">←</button>
          <h2>Kalendář</h2>
        </div>
        <input id="calendarDate" type="date">
        <div id="calendarDayRows" class="summary-rows"></div>
        <p id="calendarEmpty" class="empty hidden">V tento den nejsou žádné záznamy.</p>
      </div>
    </section>

    <section id="overviewView" class="hidden">
      <div class="view-card">
        <div class="view-heading">
          <button id="overviewBack" class="secondary">←</button>
          <h2>Přehled</h2>
        </div>
        <div class="period-tabs">
          <button type="button" data-period="week" class="active">Týden</button>
          <button type="button" data-period="month">Měsíc</button>
          <button type="button" data-period="year">Rok</button>
        </div>
        <div class="period-nav">
          <button id="periodPrev" class="secondary">‹</button>
          <strong id="periodLabel"></strong>
          <button id="periodNext" class="secondary">›</button>
        </div>
        <div class="chart-wrap">
          <canvas id="overviewChart" width="720" height="340"></canvas>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Datum</th><th>Celkem</th></tr></thead>
            <tbody id="overviewTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <button id="addBtn" class="fab hidden" aria-label="Přidat položku">+</button>

  <dialog id="addDialog">
    <form id="addForm" method="dialog">
      <h2>Nová položka</h2>
      <label>Název
        <input id="newName" maxlength="40" required autofocus>
      </label>
      <div class="actions">
        <button type="button" data-close="addDialog" class="secondary">Zrušit</button>
        <button type="submit">Přidat</button>
      </div>
    </form>
  </dialog>

  <dialog id="editDialog">
    <form id="editForm" method="dialog">
      <h2>Upravit</h2>
      <input id="editId" type="hidden">
      <label>Název
        <input id="editName" maxlength="40" required>
      </label>
      <div class="quick-grid">
        <label>Tlačítko 1<input id="quick1" type="number" min="1" max="999" required></label>
        <label>Tlačítko 2<input id="quick2" type="number" min="1" max="999" required></label>
        <label>Tlačítko 3<input id="quick3" type="number" min="1" max="999" required></label>
      </div>
      <div class="actions split">
        <button id="deleteBtn" type="button" class="danger">Smazat</button>
        <span></span>
        <button type="button" data-close="editDialog" class="secondary">Zrušit</button>
        <button type="submit">Uložit</button>
      </div>
    </form>
  </dialog>

  <dialog id="accountDialog">
    <div class="dialog-body">
      <p id="userEmail"></p>
      <button id="installBtn" class="secondary hidden">Instalovat aplikaci</button>
      <button id="logoutBtn" class="danger">Odhlásit</button>
      <button type="button" data-close="accountDialog" class="secondary">Zavřít</button>
    </div>
  </dialog>

  <template id="itemTemplate">
    <article class="item collapsed">
      <div class="item-summary">
        <button class="item-add-one" type="button" aria-label="Přičíst jeden cvik">
          <span class="item-main">
            <span class="item-name"></span>
            <small class="last-change hidden"></small>
          </span>
          <strong class="today-value">0</strong>
        </button>
        <button class="toggle-details icon-btn" type="button" aria-label="Rozbalit položku" aria-expanded="false">⌄</button>
      </div>

      <div class="item-details">
        <div class="detail-top">
          <div>
            <div class="detail-label">Celkem</div>
            <div class="count">0</div>
          </div>
          <button class="edit icon-btn" aria-label="Upravit">✎</button>
        </div>
        <div class="quick-buttons"></div>
        <form class="custom-form">
          <input class="custom-value" type="number" min="-99999" max="99999" inputmode="numeric" placeholder="Jiná hodnota">
          <button type="submit">Přidat</button>
        </form>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
